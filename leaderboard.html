<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banana Badass — Leaderboard</title>
<style>
@font-face {
  font-family: "ClaudiaShouter";
  src: url("assets/fonts/ClaudiaShouter-Black.otf") format("opentype");
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100%;
  background: #1a1008;
  font-family: "ClaudiaShouter", monospace;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  overflow-x: hidden; overflow-y: auto;
}
.container {
  width: 90%; max-width: 800px;
  border: 3px solid #FFE000;
  padding: 40px 50px 50px;
  background: #2e2624;
  box-shadow: 0 0 60px rgba(255,224,0,0.15);
  margin: 40px auto;
}
h1 {
  color: #FFE000;
  font-size: clamp(16px, 3vw, 36px);
  text-align: center;
  text-shadow: 0 0 20px rgba(255,224,0,0.5);
  margin-bottom: 8px;
  white-space: nowrap;
}
.live-badge {
  text-align: center;
  color: #4f8;
  font-size: clamp(10px, 1.5vw, 16px);
  margin-bottom: 36px;
  letter-spacing: 2px;
}
.live-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: #4f8;
  border-radius: 50%;
  margin-right: 6px;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: clamp(14px, 2.5vw, 28px);
}
thead th {
  color: #888;
  font-size: 0.5em;
  letter-spacing: 3px;
  padding-bottom: 12px;
  border-bottom: 2px solid #444;
  text-align: left;
}
thead th.score-col { text-align: right; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
tbody tr.rank-1 td { color: #FFE000; }
tbody tr.rank-2 td, tbody tr.rank-3 td { color: #FFA040; }
tbody tr.rank-other td { color: #ccc; }
td { padding: 14px 10px; }
td.score-col { text-align: right; }
.empty {
  color: #555;
  text-align: center;
  font-size: clamp(14px, 2vw, 24px);
  padding: 40px 0;
}
.flash { animation: flash 0.4s ease-out; }
@keyframes flash { 0%{background:rgba(255,224,0,0.1)} 100%{background:transparent} }
</style>
</head>
<body>
<div class="container" id="container">
  <h1>🏆 HALL OF BANANA BADASSES 🏆</h1>
  <div class="live-badge"><span class="live-dot"></span>LIVE LEADERBOARD</div>
  <table id="board">
    <thead>
      <tr><th>RANK</th><th>NAME</th><th class="score-col">SCORE</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">NO SCORES YET — BE THE FIRST!</div>
  <div style="text-align:center; margin-top:32px;">
    <button id="resetBtn" tabindex="-1"
      style="background:none; border:2px solid #553; color:#664; font-family:inherit;
             font-size:clamp(9px,1.2vw,13px); letter-spacing:2px; padding:8px 22px;
             cursor:pointer; border-radius:3px; transition:border-color 0.2s, color 0.2s;"
      onmouseover="this.style.borderColor='#c33';this.style.color='#c33';"
      onmouseout="this.style.borderColor='#553';this.style.color='#664';">
      RESET LEADERBOARD
    </button>
  </div>
</div>
<script>
const MEDALS = ["🥇","🥈","🥉"];
let lastJson = null;

function display(data) {
  const json = JSON.stringify(data);
  if (json === lastJson) return;
  lastJson = json;

  const c = document.getElementById("container");
  c.classList.remove("flash");
  void c.offsetWidth;
  c.classList.add("flash");

  const rows = document.getElementById("rows");
  const empty = document.getElementById("empty");
  rows.innerHTML = "";
  if (!data.length) {
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    data.forEach((entry, i) => {
      const tr = document.createElement("tr");
      tr.className = i === 0 ? "rank-1" : i < 3 ? "rank-2" : "rank-other";
      const rank = i < 3 ? MEDALS[i] : `${i + 1}.`;
      const tdRank  = document.createElement("td"); tdRank.textContent  = rank;
      const tdName  = document.createElement("td"); tdName.textContent  = entry.name;
      const tdScore = document.createElement("td"); tdScore.className   = "score-col";
                                                     tdScore.textContent = Number(entry.score).toLocaleString();
      tr.append(tdRank, tdName, tdScore);
      rows.appendChild(tr);
    });
  }
}

const FIREBASE_URL = "https://banana-badass-leaderboard-default-rtdb.firebaseio.com";

function render() {
  fetch(FIREBASE_URL + "/leaderboard.json")
    .then(r => r.json())
    .then(data => {
      const list = Array.isArray(data) ? data : [];
      localStorage.setItem("bb_leaderboard", JSON.stringify(list));
      display(list);
    })
    .catch(() => display(JSON.parse(localStorage.getItem("bb_leaderboard") || "[]")));
}

render();
setInterval(render, 3000);
window.addEventListener("storage", e => { if (e.key === "bb_leaderboard") render(); });

document.getElementById("resetBtn").addEventListener("click", function(e) {
  if (e.detail === 0) return;
  if (!confirm("Reset the leaderboard? This cannot be undone.")) return;
  fetch(FIREBASE_URL + "/leaderboard.json", {method:"PUT", headers:{"Content-Type":"application/json"}, body:"[]"})
    .catch(()=>{});
  localStorage.removeItem("bb_leaderboard");
  lastJson = null;
  display([]);
});
</script>
</body>
</html>
